<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Soham Malhotra</title>
  <meta name="description" content="Soham Malhotra's corner of the internet. A freshly painted wall, some old bricks, and a hole in the middle. Click the hole.">
  <meta name="color-scheme" content="light dark">
  <meta property="og:title" content="Soham Malhotra">
  <meta property="og:description" content="A wall. A hole. Click the hole.">
  <meta property="og:url" content="https://sohamm29.github.io/">
  <link rel="icon" href="assets/peep.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f1e3;            /* the paint — and the page. same thing. */
      --ink: #2b2620;
      --ink-soft: #7a7264;
      --accent: #d02020;
      --panel: #ffffff;
      --frame: #1c0800;
      --frame-glow: #ffffff;
      --shadow: rgba(0, 0, 0, .18);
      --paint-edge: #e2d9c4;    /* torn edge where the paint gave up */
      --crack: #d8cfba;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191410;          /* same wall, lights off */
        --ink: #f4efe4;
        --ink-soft: #9a8f7c;
        --accent: #ff5555;
        --panel: #241d16;
        --frame: #000000;
        --frame-glow: #3a3226;
        --shadow: rgba(0, 0, 0, .5);
        --paint-edge: #2c241b;
        --crack: #2c241b;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Press Start 2P", "Courier New", monospace;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      text-align: center;
    }

    /* ---- the wall ----
       The page background IS the paint. This SVG is the wall under it:
       chipped patches where the brick shows through, and the hole. */
    #wall {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #wall #hole, #wall #blob { pointer-events: auto; }
    #hole { cursor: pointer; outline: none; }
    #hole:focus-visible .eye { filter: drop-shadow(0 0 5px #fff); }
    .pupil { transition: transform .15s linear; }
    #blob-eyes { opacity: 0; }

    /* ---- text sits on the paint ---- */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: clamp(20px, 5vh, 44px) 16px clamp(14px, 3vh, 28px);
      pointer-events: none;
    }
    .page a, .page button { pointer-events: auto; }

    header h1 {
      font-size: clamp(15px, 4vw, 26px);
      margin: 0 0 14px;
      letter-spacing: 2px;
    }
    .tagline {
      font-size: clamp(8px, 2vw, 11px);
      color: var(--ink-soft);
      line-height: 2.1;
      margin: 0;
    }
    footer {
      font-size: 8px;
      line-height: 2.2;
      color: var(--ink-soft);
    }
    footer a { color: inherit; }
    footer .links { margin-top: 4px; }

    /* ---- hidden world dialog (the error, kept as-is) ---- */
    dialog {
      font-family: inherit;
      background: var(--panel);
      color: var(--ink);
      border: 6px solid var(--frame);
      box-shadow: 0 0 0 6px var(--frame-glow), 10px 14px 0 6px var(--shadow);
      padding: 32px 28px;
      max-width: min(440px, 88vw);
      text-align: center;
    }
    dialog::backdrop { background: rgba(0, 0, 0, .7); }
    dialog h2 { font-size: clamp(11px, 3vw, 15px); line-height: 1.8; margin: 0 0 20px; color: var(--accent); }
    dialog p { font-size: clamp(9px, 2.4vw, 11px); line-height: 2.1; margin: 0 0 28px; }
    .btn {
      font-family: inherit;
      font-size: clamp(9px, 2.2vw, 12px);
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      background: var(--panel);
      border: 4px solid var(--frame);
      box-shadow: 5px 5px 0 var(--frame);
      padding: 14px 20px;
      cursor: pointer;
      transition: transform .05s steps(1), box-shadow .05s steps(1);
    }
    .btn:hover { background: var(--accent); color: #fff; }
    .btn:active { transform: translate(5px, 5px); box-shadow: 0 0 0 var(--frame); }
  </style>
</head>
<body>

    <defs>

        <path d="M16 0v16M48 0v16M32 16v16M0 16v16M64 16v16" stroke="#1c0800" stroke-width="3"/>
      </pattern>
    </defs>

    <!-- cracks radiating out from the hole -->
    <g stroke="var(--crack)" stroke-width="3" fill="none">

      <path d="M422 424 l-80 30 l-44 8"/>
      <path d="M452 288 l-48 -54 l-14 -44"/>
      <path d="M540 262 l-20 -64 l8 -36"/>
      <path d="M600 262 l-6 -58 l14 -32"/>
      <path d="M700 282 l36 -58 l40 -28"/>
      <path d="M854 344 l68 -28 l52 -8"/>
      <path d="M854 436 l62 34 l28 42"/>
      <path d="M828 512 l52 58 l12 44"/>
      <path d="M726 538 l30 62 l-6 38"/>
      <path d="M640 538 l6 66 l-12 30"/>
      <path d="M540 518 l-44 62 l-48 26"/>
      <path d="M452 486 l-62 40"/>
    </g>

    <!-- small chips: paint gone, brick showing -->
    <g>
      <rect x="90" y="122" width="66" height="38" fill="var(--paint-edge)"/>

      <rect x="1130" y="90" width="56" height="52" fill="var(--paint-edge)"/>
      <rect x="1136" y="96" width="44" height="40" fill="url(#bricks)"/>
      <rect x="162" y="634" width="72" height="34" fill="var(--paint-edge)"/>
      <rect x="168" y="640" width="60" height="22" fill="url(#bricks)"/>
      <rect x="1052" y="606" width="64" height="46" fill="var(--paint-edge)"/>
      <rect x="1058" y="612" width="52" height="34" fill="url(#bricks)"/>
      <rect x="324" y="174" width="48" height="32" fill="var(--paint-edge)"/>
      <rect x="330" y="180" width="36" height="20" fill="url(#bricks)"/>
      <rect x="944" y="204" width="52" height="34" fill="var(--paint-edge)"/>
      <rect x="950" y="210" width="40" height="22" fill="url(#bricks)"/>
      <rect x="234" y="414" width="42" height="30" fill="var(--paint-edge)"/>
      <rect x="240" y="420" width="30" height="18" fill="url(#bricks)"/>
      <rect x="1004" y="434" width="46" height="32" fill="var(--paint-edge)"/>
      <rect x="1010" y="440" width="34" height="20" fill="url(#bricks)"/>
    </g>
    <!-- lone flecks -->
    <g fill="#c84c0c">
      <rect x="540" y="160" width="8" height="8"/>

      <rect x="410" y="580" width="6" height="6"/>
      <rect x="880" y="150" width="6" height="6"/>
    </g>

    <!-- the big exposure: torn paint rim, then brick -->
    <g fill="var(--paint-edge)">
      <rect x="452" y="282" width="376" height="236"/>
      <rect x="422" y="322" width="38" height="136"/>
      <rect x="812" y="312" width="42" height="156"/>
      <rect x="492" y="262" width="136" height="36"/>
      <rect x="612" y="502" width="156" height="36"/>
    </g>
    <g fill="url(#bricks)">
      <rect x="460" y="290" width="360" height="220"/>
      <rect x="430" y="330" width="30" height="120"/>

      <rect x="500" y="270" width="120" height="20"/>
      <rect x="620" y="510" width="140" height="20"/>
    </g>

    <!-- the hole, punched through the bricks. click it. -->
    <g id="hole" role="button" tabindex="0" aria-label="A hole in the brick wall, with eyes peeping out — click to see where it goes">
      <rect x="586" y="362" width="108" height="76" fill="#000000"/>
      <rect x="570" y="378" width="140" height="44" fill="#000000"/>
      <rect x="602" y="350" width="76" height="100" fill="#000000"/>
      <!-- broken brick teeth around the rim -->
      <g fill="#7a2e08">
        <rect x="586" y="354" width="16" height="10"/>
        <rect x="678" y="352" width="14" height="10"/>
        <rect x="566" y="392" width="10" height="14"/>
        <rect x="704" y="396" width="10" height="12"/>
        <rect x="596" y="436" width="14" height="10"/>
        <rect x="672" y="440" width="16" height="10"/>
      </g>
      <circle class="eye" cx="620" cy="394" r="8" fill="#ffffff"/>
      <circle class="eye" cx="660" cy="394" r="8" fill="#ffffff"/>
      <circle class="pupil" cx="621" cy="395" r="3.6" fill="#000000"/>
      <circle class="pupil" cx="659" cy="395" r="3.6" fill="#000000"/>
    </g>

    <!-- a blob, camouflaged in the paint. perched on a brick ledge. -->
    <g id="blob" aria-hidden="true">
      <path d="M1002 440 q-2 -30 25 -30 q27 0 25 30 q-2 4 -25 4 q-23 0 -25 -4 z"
            fill="var(--bg)" stroke="var(--paint-edge)" stroke-width="3"/>
      <g id="blob-eyes" fill="#2b2620">
        <rect x="1018" y="420" width="5" height="8"/>
        <rect x="1032" y="420" width="5" height="8"/>
      </g>
    </g>
  </svg>

  <div class="page">
    <header>
      <h1>SOHAM MALHOTRA</h1>
      <p class="tagline">fresh coat of paint. same old bricks.</p>
    </header>

    <footer>
      &copy; 2026 Soham Malhotra
      <div class="links">
        <a href="https://github.com/sohamm29">github.com/sohamm29</a> &middot;
        <a href="https://github.com/sohamm29/sohamm29.github.io">source</a>
      </div>
    </footer>
  </div>

  <dialog id="warp">
    <h2>&#127812; oops, hidden world discovered!</h2>
    <p>we still haven't completed support for it yet...<br>come back later, plumber. &#128679;</p>
    <form method="dialog"><button class="btn">Exit pipe &#9654;</button></form>
  </dialog>

  <script>
    const $ = (s, r = document) => r.querySelector(s);
    const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* tiny 8-bit sounds (no assets, just WebAudio) */
    let ac;
    function blip(notes) {
      try {
        ac = ac || new (window.AudioContext || window.webkitAudioContext)();
        const t0 = ac.currentTime;
        notes.forEach(([freq, at, dur]) => {
          const osc = ac.createOscillator(), gain = ac.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.06, t0 + at);
          gain.gain.exponentialRampToValueAtTime(0.001, t0 + at + dur);
          osc.connect(gain).connect(ac.destination);
          osc.start(t0 + at);
          osc.stop(t0 + at + dur);
        });
      } catch (e) { /* silence is golden */ }
    }

    /* the hole: launch if the probe is installed, otherwise the old error */
    const warp = $('#warp');
    function openHole() {
      if (window.PORTAL && PORTAL.launch) { PORTAL.launch(); return; }
      blip([[196, 0, .12], [155.56, .1, .2]]);
      warp.showModal();
    }
    const hole = $('#hole');
    hole.addEventListener('click', openHole);
    hole.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openHole(); }
    });

    /* the eyes follow you */
    if (!reducedMotion) {
      const pupils = document.querySelectorAll('.pupil');
      let raf = null;
      addEventListener('mousemove', e => {
        if (raf) return;
        raf = requestAnimationFrame(() => {
          raf = null;
          pupils.forEach(p => {
            const r = p.getBoundingClientRect();
            const dx = e.clientX - (r.left + r.width / 2);
            const dy = e.clientY - (r.top + r.height / 2);
            const d = Math.hypot(dx, dy) || 1;
            p.style.transform = `translate(${(dx / d) * 2}px, ${(dy / d) * 2}px)`;
          });
        });
      });
    }
  </script>
</body>
</html>
