<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400" role="img" aria-label="Mario-style sign: currently being worked on">
  <!-- classic Mario sky -->
  <rect width="640" height="400" fill="#5c94fc"/>

  <!-- pixel clouds -->
  <g fill="#ffffff">
    <rect x="60"  y="40" width="72" height="20" rx="10"/>
    <rect x="76"  y="26" width="40" height="20" rx="10"/>
    <rect x="480" y="64" width="88" height="20" rx="10"/>
    <rect x="500" y="50" width="48" height="20" rx="10"/>
  </g>

  <!-- floating ? block for good measure -->
  <g>
    <rect x="552" y="140" width="48" height="48" fill="#e39d25" stroke="#7a4a00" stroke-width="4"/>
    <text x="576" y="175" font-family="monospace" font-size="30" font-weight="bold" fill="#fff" text-anchor="middle">?</text>
    <rect x="556" y="144" width="6" height="6" fill="#7a4a00"/>
    <rect x="590" y="144" width="6" height="6" fill="#7a4a00"/>
    <rect x="556" y="178" width="6" height="6" fill="#7a4a00"/>
    <rect x="590" y="178" width="6" height="6" fill="#7a4a00"/>
  </g>

  <!-- brick pattern -->
  <defs>
    <pattern id="bricks" width="64" height="32" patternUnits="userSpaceOnUse">
      <rect width="64" height="32" fill="#c84c0c"/>
      <path d="M0 0h64M0 16h64M0 32h64" stroke="#1c0800" stroke-width="3"/>
      <path d="M16 0v16M48 0v16M32 16v16M0 16v16M64 16v16" stroke="#1c0800" stroke-width="3"/>
      <rect width="64" height="32" fill="none" stroke="none"/>
    </pattern>
  </defs>

  <!-- ground: brick foundation -->
  <rect x="0" y="336" width="640" height="64" fill="url(#bricks)"/>
  <rect x="0" y="332" width="640" height="6" fill="#1c0800"/>

  <!-- brick pillar holding the sign up -->
  <rect x="288" y="240" width="64" height="96" fill="url(#bricks)"/>
  <rect x="284" y="240" width="4" height="96" fill="#1c0800"/>
  <rect x="352" y="240" width="4" height="96" fill="#1c0800"/>

  <!-- === the sign === -->
  <!-- drop shadow -->
  <rect x="128" y="72" width="384" height="168" fill="#00000033"/>
  <!-- white frame -->
  <rect x="120" y="64" width="384" height="168" fill="#ffffff"/>
  <!-- inner panel, slightly aged white -->
  <rect x="140" y="84" width="344" height="128" fill="#f4efe4"/>
  <rect x="140" y="84" width="344" height="128" fill="none" stroke="#d8d2c2" stroke-width="2"/>

  <!-- white paint chipping off the frame (notches showing sky / dark undercoat) -->
  <g>
    <rect x="120" y="64"  width="14" height="10" fill="#5c94fc"/>
    <rect x="220" y="64"  width="18" height="8"  fill="#5c94fc"/>
    <rect x="404" y="64"  width="12" height="12" fill="#5c94fc"/>
    <rect x="492" y="96"  width="12" height="16" fill="#5c94fc"/>
    <rect x="496" y="180" width="8"  height="14" fill="#5c94fc"/>
    <rect x="120" y="150" width="10" height="18" fill="#5c94fc"/>
    <rect x="160" y="224" width="20" height="8"  fill="#5c94fc"/>
    <rect x="330" y="226" width="14" height="6"  fill="#5c94fc"/>
    <rect x="470" y="222" width="16" height="10" fill="#5c94fc"/>
  </g>

  <!-- paint chipping off the center panel (grey undercoat + cracks) -->
  <g fill="#b9b2a0">
    <rect x="152" y="94"  width="16" height="10"/>
    <rect x="164" y="100" width="8"  height="8"/>
    <rect x="452" y="90"  width="20" height="12"/>
    <rect x="444" y="98"  width="10" height="8"/>
    <rect x="150" y="192" width="12" height="12"/>
    <rect x="460" y="196" width="16" height="10"/>
    <rect x="300" y="200" width="10" height="8"/>
  </g>
  <g stroke="#b9b2a0" stroke-width="2" fill="none">
    <path d="M168 104 l10 8 l-4 8"/>
    <path d="M452 102 l-8 8 l6 6"/>
    <path d="M310 208 l8 -6"/>
  </g>

  <!-- sign text -->
  <text x="312" y="132" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#d02020" text-anchor="middle" letter-spacing="2">CURRENTLY BEING</text>
  <text x="312" y="172" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#d02020" text-anchor="middle" letter-spacing="2">WORKED ON</text>
  <text x="312" y="198" font-family="'Courier New', monospace" font-size="13" fill="#8a8372" text-anchor="middle">~ world 1-1 under construction ~</text>

  <!-- small hole in the ground, with something peeping out -->
  <ellipse cx="480" cy="340" rx="34" ry="10" fill="#000000"/>
  <rect x="446" y="340" width="68" height="14" fill="#000000"/>
  <ellipse cx="480" cy="354" rx="34" ry="8" fill="#000000"/>
  <!-- the peeper -->
  <circle cx="470" cy="336" r="5" fill="#ffffff"/>
  <circle cx="490" cy="336" r="5" fill="#ffffff"/>
  <circle cx="471" cy="337" r="2.4" fill="#000000"/>
  <circle cx="489" cy="337" r="2.4" fill="#000000"/>

  <!-- tiny warp pipe on the left, why not -->
  <g>
    <rect x="72" y="288" width="56" height="48" fill="#00a800" stroke="#003800" stroke-width="4"/>
    <rect x="64" y="272" width="72" height="24" fill="#00a800" stroke="#003800" stroke-width="4"/>
    <rect x="76" y="276" width="10" height="16" fill="#80f080"/>
    <rect x="84" y="292" width="8" height="40" fill="#80f080"/>
  </g>
</svg>
