<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice">
  <!-- the wall: paint, a few chips, straight hairline cracks, and the hole.
       standalone version of the inline #wall in index.html. -->
  <style>
    :root {
      --bg: #f7f1e3;
      --paint-edge: #e2d9c4;
      --crack: #d8cfba;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191410;
        --paint-edge: #2c241b;
        --crack: #2c241b;
      }
    }
  </style>

  <defs>
    <pattern id="bricks" width="64" height="32" patternUnits="userSpaceOnUse">
      <rect width="64" height="32" fill="#c84c0c"/>
      <path d="M0 0h64M0 16h64M0 32h64" stroke="#1c0800" stroke-width="3"/>
      <path d="M16 0v16M48 0v16M32 16v16M0 16v16M64 16v16" stroke="#1c0800" stroke-width="3"/>
    </pattern>
  </defs>

  <!-- the paint -->
  <rect width="1280" height="800" fill="var(--bg)"/>

  <!-- short cracks stepping out from the hole: horizontal and vertical only -->
  <g stroke="var(--crack)" stroke-width="3" fill="none">
    <path d="M422 352 h-44 v-20 h-36"/>
    <path d="M422 430 h-32 v24 h-44"/>
    <path d="M540 262 v-38 h-26 v-24"/>
    <path d="M648 262 v-32 h30 v-34"/>
    <path d="M854 348 h46 v-22 h38"/>
    <path d="M854 444 h40 v26 h32"/>
    <path d="M712 538 v36 h26 v28"/>
    <path d="M572 538 v42 h-30 v22"/>
  </g>

  <!-- three mini holes: paint gone, brick showing -->
  <g>
    <rect x="150" y="140" width="60" height="36" fill="var(--paint-edge)"/>
    <rect x="156" y="146" width="48" height="24" fill="url(#bricks)"/>
    <rect x="1080" y="210" width="52" height="40" fill="var(--paint-edge)"/>
    <rect x="1086" y="216" width="40" height="28" fill="url(#bricks)"/>
    <rect x="200" y="620" width="64" height="34" fill="var(--paint-edge)"/>
    <rect x="206" y="626" width="52" height="22" fill="url(#bricks)"/>
  </g>

  <!-- the big exposure: torn paint rim, then brick -->
  <g fill="var(--paint-edge)">
    <rect x="452" y="282" width="376" height="236"/>
    <rect x="422" y="322" width="38" height="136"/>
    <rect x="812" y="312" width="42" height="156"/>
    <rect x="492" y="262" width="136" height="36"/>
    <rect x="612" y="502" width="156" height="36"/>
  </g>
  <g fill="url(#bricks)">
    <rect x="460" y="290" width="360" height="220"/>
    <rect x="430" y="330" width="30" height="120"/>
    <rect x="820" y="320" width="26" height="140"/>
    <rect x="500" y="270" width="120" height="20"/>
    <rect x="620" y="510" width="140" height="20"/>
  </g>

  <!-- the hole, punched through the bricks -->
  <g>
    <rect x="586" y="362" width="108" height="76" fill="#000000"/>
    <rect x="570" y="378" width="140" height="44" fill="#000000"/>
    <rect x="602" y="350" width="76" height="100" fill="#000000"/>
    <!-- broken brick teeth around the rim -->
    <g fill="#7a2e08">
      <rect x="586" y="354" width="16" height="10"/>
      <rect x="678" y="352" width="14" height="10"/>
      <rect x="566" y="392" width="10" height="14"/>
      <rect x="704" y="396" width="10" height="12"/>
      <rect x="596" y="436" width="14" height="10"/>
      <rect x="672" y="440" width="16" height="10"/>
    </g>
    <circle cx="620" cy="394" r="8" fill="#ffffff"/>
    <circle cx="660" cy="394" r="8" fill="#ffffff"/>
    <circle cx="621" cy="395" r="3.6" fill="#000000"/>
    <circle cx="659" cy="395" r="3.6" fill="#000000"/>
  </g>

  <!-- the blob, camouflaged in the paint -->
  <g>
    <path d="M1002 440 q-2 -30 25 -30 q27 0 25 30 q-2 4 -25 4 q-23 0 -25 -4 z"
          fill="var(--bg)" stroke="var(--paint-edge)" stroke-width="3"/>
  </g>
</svg>
